


{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Portfolio</title>

    <!-- Link CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

    <div class="app">
        {% block content %}
        {% endblock %}
    </div>

</body>
</html>

<style>
    .app {
        max-width: 900px;
        margin: 0 auto;
        padding: 20px;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        
    }

    .section {
        margin-bottom: 40px;
    }

    .section-title {
        font-size: 2rem;
        color: #1e3c72;
        border-bottom: 2px solid #1e3c72;
        padding-bottom: 5px;
        margin-bottom: 20px;
    }
    .timeline {
        position: relative;
        margin-left: 20px;
        padding-left: 20px;
        border-left: 2px solid #1e3c72;
    }
    .timeline-item {
        position: relative;
        margin-bottom: 30px;
    }
    .timeline-date {
        position: absolute;
        left: -120px;
        top: 0;
        font-size: 0.9rem;
        color: #555;
    }
    .timeline-content {
        padding-left: 20px;
    }
</style>
