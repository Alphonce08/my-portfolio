{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Alphonce Rotich | Portfolio</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div class="app">

<header class="header">
  <div class="header-content">

    <!-- Profile Image Section -->
    <div class="profile-image-container">
      <img 
        src="{% static 'img/profile.jpg.jpeg' %}" 
        alt="Alphonce Rotich" 
        class="profile-image"
      />
      <div class="image-overlay">
        <span class="overlay-text">Software Engineer</span>
      </div>
    </div>

    <!-- Header Info -->
    <div class="header-info">
      <h1>Alphonce Rotich</h1>
      <p>Software Engineer</p>
    </div>

    <!-- Contact Info -->
    <div class="contact-info">
      
      <a href="https://www.linkedin.com/in/alphonce-rotich/" 
         class="contact-item" 
         target="_blank">
        <i class="fab fa-linkedin contact-icon"></i>
        <span>LinkedIn</span>
      </a>

      <a href="mailto:alphoncerotich30@gmail.com" 
         class="contact-item">
        <i class="fas fa-envelope contact-icon"></i>
        <span>alphoncerotich30@gmail.com</span>
      </a>

      <div class="contact-item">
        <i class="fas fa-phone contact-icon"></i>
        <span>+254 708 477 938</span>
      </div>

    </div>

  </div>
</header>



</div>
</body>
</html>



<style>
    .header {
        background-color: #f5f5f5;
        padding: 40px 20px;
        border-radius: 10px;
        box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        display: flex;
        flex-direction: column;
        align-items: center;
    }
    .profile-image-container {
        position: relative;
        width: 150px;
        height: 150px;
        margin-bottom: 20px;
    }
    .profile-image {
        width: 100%;
        height: 100%;
        border-radius: 50%;
        object-fit: cover;
    }
    .image-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(30,60,114,0.7);
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        transition: opacity 0.3s ease-in-out;
        border-radius: 50%;
    }
    .profile-image-container:hover .image-overlay {
        opacity: 1;
    }
    .header-info h1 {
        font-size: 2.5rem;
        margin-bottom: 10px;
    }
    .header-info p {
        font-size: 1.2rem;
        color: #555;
    }
    .contact-info {
        margin-top: 20px;
    }
    .contact-item {
        display: flex;
        align-items: center;
        margin-bottom: 10px;
        text-decoration: none;
        color: #333;
    }
    .contact-icon {
        font-size: 1.5rem;
        margin-right: 10px;
    }
    .contact-item:hover {
        color: #1e3c72;
    }
</style>
