{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Alphonce Rotich | Portfolio</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">



</head>

<body>

<div class="app">

<header class="header">

<div class="header-content">

<!-- Profile Image -->
<div class="profile-image-container">
<img src="{% static 'img/profile.jpeg' %}" alt="Alphonce Rotich" class="profile-image">

<div class="image-overlay">
<span>Software Developer</span>
</div>
</div>

<!-- Name -->
<div class="header-info">
<h1>Alphonce Rotich</h1>
<p>Software Engineer</p>
</div>

<!-- Contact -->
<div class="contact-info">

<a href="https://www.linkedin.com/in/alphonce-rotich/" class="contact-item" target="_blank">
<i class="fab fa-linkedin contact-icon"></i>
<span>LinkedIn</span>
</a>

<a href="mailto:alphoncerotich30@gmail.com" class="contact-item">
<i class="fas fa-envelope contact-icon"></i>
<span>alphoncerotich30@gmail.com</span>
</a>

<div class="contact-item">
<i class="fas fa-phone contact-icon"></i>
<span>+254 708 477 938</span>
</div>

</div>

</div>
</header>

</div>

</body>
</html>


<style>

/* GENERAL */
body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
}

.app{
    padding:20px;
}

/* HEADER */
.header{
    background-color:#f5f5f5;
    padding:40px 20px;
    border-radius:12px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

/* FLEX CONTAINER */
.header-content{
    max-width:1100px;
    margin:auto;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:40px;
    flex-wrap:wrap;
}

/* PROFILE IMAGE */
.profile-image-container{
    position:relative;
    width:150px;
    height:150px;
    flex-shrink:0;
}

.profile-image{
    width:100%;
    height:100%;
    border-radius:50%;
    object-fit:cover;
}

/* IMAGE OVERLAY */
.image-overlay{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background-color:rgba(30,60,114,0.75);
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    opacity:0;
    transition:0.3s;
    border-radius:50%;
}

.profile-image-container:hover .image-overlay{
    opacity:1;
}

/* HEADER TEXT */
.header-info{
    flex:1;
}

.header-info h1{
    font-size:2.3rem;
    margin:0 0 10px 0;
}

.header-info p{
    font-size:1.2rem;
    color:#555;
}

/* CONTACT INFO */
.contact-info{
    display:flex;
    flex-direction:column;
    gap:10px;
}

.contact-item{
    display:flex;
    align-items:center;
    gap:10px;
    text-decoration:none;
    color:#333;
    font-size:0.95rem;
}

.contact-icon{
    font-size:1.3rem;
}

.contact-item:hover{
    color:#1e3c72;
}

/* ---------- RESPONSIVE DESIGN ---------- */

/* Split screen / tablet */
@media (max-width:900px){

.header-content{
    justify-content:center;
    text-align:center;
}

.header-info{
    width:100%;
}

.contact-info{
    align-items:center;
}

}

/* Phones */
@media (max-width:500px){

.profile-image-container{
    width:120px;
    height:120px;
}

.header-info h1{
    font-size:1.8rem;
}

.header-info p{
    font-size:1rem;
}

.contact-item{
    font-size:0.9rem;
}

}

</style>
